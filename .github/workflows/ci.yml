name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python3 tests/unit/_runner.py

  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate plugin.json parses, and marketplace.json is absent by design
        run: |
          python - <<'EOF'
          import json, os, sys

          # plugin.json must parse.
          try:
              with open(".claude-plugin/plugin.json") as f:
                  json.load(f)
              print("OK: .claude-plugin/plugin.json parses")
          except Exception as e:
              print(f"FAIL: .claude-plugin/plugin.json — {e}", file=sys.stderr)
              sys.exit(1)

          # marketplace.json must NOT exist: a marketplace manifest beside plugin.json
          # makes the skills-directory loader treat the folder as a marketplace, so
          # Claire's commands never register on the git-clone install path.
          if os.path.exists(".claude-plugin/marketplace.json"):
              print("FAIL: .claude-plugin/marketplace.json must not exist (breaks the "
                    "clone-into-skills-dir install)", file=sys.stderr)
              sys.exit(1)
          print("OK: no marketplace.json present (correct for the clone install)")
          EOF
